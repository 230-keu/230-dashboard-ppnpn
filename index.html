<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Presensi - Login & Daftar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.90); backdrop-filter: blur(15px); }
        
        /* Animasi Transisi Halus */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Modifikasi Input Focus */
        input:focus ~ .icon-input { color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center bg-fixed relative">
    
    <div class="absolute inset-0 bg-blue-900/50 backdrop-blur-sm z-0"></div>

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-white font-medium text-sm">Menyiapkan portal akun baru Anda...</p>
    </div>

    <div class="glass-panel w-full max-w-sm rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden relative z-10 border border-white/30 p-8">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-500 text-white shadow-lg mb-4">
                <i class="fa-solid fa-fingerprint text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Portal Presensi</h2>
            <p class="text-slate-500 text-xs font-medium mt-1 uppercase tracking-wider">Kanwil DJP Kalimantan Barat</p>
        </div>

        <div id="formLogin" class="fade-in block">
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="username" placeholder="Masukkan Username" autocapitalize="none" autocorrect="off" autocomplete="username" class="w-full pl-12 pr-4 py-3.5 rounded-2xl border border-slate-200 bg-white/70 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm font-medium text-slate-700 shadow-sm" required>
                    <i class="fa-solid fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 transition-colors icon-input"></i>
                </div>
                
                <div class="relative">
                    <input type="password" id="password" placeholder="Password" class="w-full pl-12 pr-12 py-3.5 rounded-2xl border border-slate-200 bg-white/70 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm font-medium text-slate-700 shadow-sm" required>
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 transition-colors icon-input"></i>
                    <button type="button" onclick="togglePassword('password', 'eyeLogin')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-blue-500 focus:outline-none transition-colors">
                        <i id="eyeLogin" class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div id="pesanLogin" class="mt-4 text-center text-sm font-bold h-5"></div>

            <button id="btnLogin" onclick="prosesLogin()" class="w-full mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 rounded-2xl shadow-lg transform transition-all active:scale-95 flex items-center justify-center gap-2">
                Masuk <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>

            <div class="mt-6 text-center">
                <p class="text-slate-500 text-xs">Belum terdaftar di sistem?</p>
                <button onclick="tukarForm('daftar')" class="text-blue-600 hover:text-blue-800 text-sm font-bold mt-1 transition-colors">Daftar Akun Baru</button>
            </div>
        </div>

        <div id="formDaftar" class="fade-in hidden">
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="regUsername" placeholder="Buat Username (Tanpa Spasi)" autocapitalize="none" autocorrect="off" class="w-full pl-12 pr-4 py-3.5 rounded-2xl border border-slate-200 bg-white/70 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm font-medium text-slate-700 shadow-sm" required>
                    <i class="fa-solid fa-at absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 transition-colors icon-input"></i>
                </div>

                <div class="relative">
                    <input type="text" id="regNama" placeholder="Nama Lengkap (Sesuai KTP)" class="w-full pl-12 pr-4 py-3.5 rounded-2xl border border-slate-200 bg-white/70 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm font-medium text-slate-700 shadow-sm" required>
                    <i class="fa-regular fa-id-card absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 transition-colors icon-input"></i>
                </div>
                
                <div class="relative">
                    <input type="password" id="regPassword" placeholder="Buat Password" class="w-full pl-12 pr-12 py-3.5 rounded-2xl border border-slate-200 bg-white/70 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all text-sm font-medium text-slate-700 shadow-sm" required>
                    <i class="fa-solid fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 transition-colors icon-input"></i>
                    <button type="button" onclick="togglePassword('regPassword', 'eyeDaftar')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-indigo-500 focus:outline-none transition-colors">
                        <i id="eyeDaftar" class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div id="pesanDaftar" class="mt-4 text-center text-sm font-bold h-5"></div>

            <button id="btnDaftar" onclick="prosesDaftar()" class="w-full mt-4 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3.5 rounded-2xl shadow-lg transform transition-all active:scale-95 flex items-center justify-center gap-2">
                Daftar Sekarang <i class="fa-solid fa-user-plus"></i>
            </button>

            <div class="mt-6 text-center">
                <button onclick="tukarForm('login')" class="text-slate-500 hover:text-slate-800 text-sm font-bold transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Masuk</button>
            </div>
        </div>
    </div>

    <script>
        const URL_GAS = "/api/proxy";
        const URL_DASHBOARD = "dashboard.html";
        const URL_ADMIN = "admin.html";

        const savedUser = localStorage.getItem('username');
        if(savedUser) {
            if(savedUser === 'admin') window.location.href = URL_ADMIN;
            else window.location.href = URL_DASHBOARD;
        }

        function tukarForm(target) {
            const formLogin = document.getElementById('formLogin');
            const formDaftar = document.getElementById('formDaftar');
            
            if(target === 'daftar') {
                formLogin.classList.remove('block');
                formLogin.classList.add('hidden');
                formDaftar.classList.remove('hidden');
                formDaftar.classList.add('block');
                document.getElementById('pesanLogin').innerHTML = '';
            } else {
                formDaftar.classList.remove('block');
                formDaftar.classList.add('hidden');
                formLogin.classList.remove('hidden');
                formLogin.classList.add('block');
                document.getElementById('pesanDaftar').innerHTML = '';
            }
        }

        function togglePassword(inputId, iconId) {
            const inputField = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (inputField.type === "password") {
                inputField.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                inputField.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        function prosesLogin() {
            // PERBAIKAN: Paksa input menjadi huruf kecil semua (toLowerCase)
            const usr = document.getElementById('username').value.trim().toLowerCase(); 
            const pass = document.getElementById('password').value;
            const pesan = document.getElementById('pesanLogin');
            const btn = document.getElementById('btnLogin');

            if(!usr || !pass) {
                pesan.innerHTML = '<span class="text-red-500"><i class="fa-solid fa-circle-exclamation"></i> Wajib diisi!</span>';
                return;
            }

            const teksAsli = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i>';
            btn.disabled = true;
            pesan.innerHTML = '<span class="text-amber-500">Memeriksa data...</span>';

            fetch(URL_GAS, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'login', username: usr, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    pesan.innerHTML = '<span class="text-green-500"><i class="fa-solid fa-circle-check"></i> Berhasil masuk!</span>';
                    
                    // Simpan versi huruf kecil ke memori HP
                    localStorage.setItem('username', usr);
                    localStorage.setItem('user_nama', data.nama);
                    
                    if(usr === 'admin') window.location.href = URL_ADMIN;
                    else window.location.href = URL_DASHBOARD;
                } else {
                    pesan.innerHTML = `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> ${data.message}</span>`;
                    btn.innerHTML = teksAsli;
                    btn.disabled = false;
                }
            })
            .catch(() => {
                pesan.innerHTML = '<span class="text-red-500"><i class="fa-solid fa-wifi"></i> Gagal koneksi!</span>';
                btn.innerHTML = teksAsli;
                btn.disabled = false;
            });
        }

        function prosesDaftar() {
            const usrRaw = document.getElementById('regUsername').value;
            // Mengambil nama, mengubahnya jadi huruf kecil semua, lalu menghurufbesarkan awal setiap kata
            const namaRaw = document.getElementById('regNama').value.trim();
            const nama = namaRaw.toLowerCase().replace(/\b\w/g, huruf => huruf.toUpperCase());
            const pass = document.getElementById('regPassword').value;
            const pesan = document.getElementById('pesanDaftar');
            const btn = document.getElementById('btnDaftar');

            if (/\s/.test(usrRaw)) {
                pesan.innerHTML = '<span class="text-red-500"><i class="fa-solid fa-circle-exclamation"></i> Username tidak boleh memakai spasi!</span>';
                return;
            }

            // PERBAIKAN: Paksa input pendaftaran menjadi huruf kecil semua
            const usr = usrRaw.trim().toLowerCase(); 

            if(!usr || !nama || !pass) {
                pesan.innerHTML = '<span class="text-red-500"><i class="fa-solid fa-circle-exclamation"></i> Wajib diisi!</span>';
                return;
            }
            if(usr === 'admin') {
                pesan.innerHTML = '<span class="text-red-500">Username tidak diizinkan!</span>';
                return;
            }

            const teksAsli = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i>';
            btn.disabled = true;
            pesan.innerHTML = '<span class="text-amber-500">Mendaftarkan...</span>';

            fetch(URL_GAS, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'add_user', username: usr, nama: nama, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    pesan.innerHTML = '<span class="text-green-500"><i class="fa-solid fa-circle-check"></i> Sukses! Mengalihkan...</span>';
                    
                    document.getElementById('loadingOverlay').classList.remove('hidden');

                    document.getElementById('regUsername').value = '';
                    document.getElementById('regNama').value = '';
                    document.getElementById('regPassword').value = '';
                    btn.innerHTML = teksAsli;
                    btn.disabled = false;

                    setTimeout(() => {
                        document.getElementById('loadingOverlay').classList.add('hidden');
                        tukarForm('login'); 
                    }, 2000); 
                } else {
                    pesan.innerHTML = `<span class="text-red-500">${data.message}</span>`;
                    btn.innerHTML = teksAsli;
                    btn.disabled = false;
                }
            })
            .catch(() => {
                pesan.innerHTML = '<span class="text-red-500"><i class="fa-solid fa-wifi"></i> Gagal koneksi!</span>';
                btn.innerHTML = teksAsli;
                btn.disabled = false;
            });
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Sistem Cache Aktif!', reg.scope))
                .catch(err => console.log('Cache Gagal:', err));
            });
        }
    </script>
</body>
</html>
